name: Deploy to Vercel

# Builds, tests, and deploys the production site on every push to main.
# Safely no-ops if Vercel secrets are not configured (see DEPLOY.md).

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::notice::VERCEL_TOKEN not set — skipping deploy. See DEPLOY.md to enable."
            exit 0
          fi
          npx --yes vercel@latest deploy --prod --yes --token "$VERCEL_TOKEN"
